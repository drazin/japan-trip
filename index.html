<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e4e4e7; --muted: #9ca3af;
    --accent: #3b82f6; --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
    --cyan: #06b6d4; --pink: #ec4899; --purple: #a855f7; --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 15px; }
  .header { padding: 28px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .header h1 { font-size: 28px; font-weight: 700; }
  .header .subtitle { color: var(--muted); font-size: 15px; }
  .header-actions { display: flex; gap: 10px; }
  .header-actions button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .header-actions button:hover { border-color: var(--accent); color: var(--text); }

  .stats-bar { display: flex; gap: 14px; padding: 16px 40px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; min-width: 120px; cursor: pointer; transition: all 0.15s; }
  .stat:hover { border-color: var(--accent); }
  .stat.active-stat { border-color: var(--accent); background: rgba(59,130,246,0.08); }
  .stat .label { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
  .stat .value { font-size: 24px; font-weight: 700; margin-top: 4px; }

  .tabs { display: flex; gap: 0; padding: 0 40px; border-bottom: 1px solid var(--border); }
  .tab { padding: 14px 24px; cursor: pointer; font-size: 16px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .controls { display: flex; gap: 8px; padding: 16px 40px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 14px; cursor: pointer; transition: all 0.15s; }

<body>

<div class="header">
  <div>
    <h1>Drazin Family Japan Journey</h1>

  </div>

    <button onclick="exportActions()">Export Progress</button>
    <button onclick="document.getElementById('import-file').click()">Import Progress</button>

</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="tabs">

</div>

    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">Area</div>

<script>
const ACTIONS = {

const DAYS = [
  {n:1,d:'Mon 8/17',c:'Tokyo',t:'Arrival'},

  {n:3,d:'Wed 8/19',c:'Tokyo',t:'Harajuku/Shibuya'},

  {n:5,d:'Fri 8/21',c:'Tokyo',t:'Flex Day'},
  {n:6,d:'Sat 8/22',c:'Hakone',t:'Onsen'},

// Persistence — shared server with localStorage fallback
const STORAGE_KEY = 'drazin-japan-actions';
const MANUAL_KEY = 'drazin-japan-manual';
let itemActions = {};
let saveTimer = null;

async function loadActions() {
  try {
    const res = await fetch('/api/state');
    if (res.ok) {
      const data = await res.json();
      itemActions = data.actions || {};
      localStorage.setItem(STORAGE_KEY, JSON.stringify(itemActions));
      if (data.manual && data.manual.length) {
        const existing = new Set(DATA.map(d => d.name.toLowerCase()));
        data.manual.forEach(item => {
          if (!existing.has(item.name.toLowerCase())) { DATA.push(item); existing.add(item.name.toLowerCase()); }
        });
        localStorage.setItem(MANUAL_KEY, JSON.stringify(data.manual));
      }
      return;
    }
  } catch(e) {}
  try { itemActions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { itemActions = {}; }
}

function saveActions() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(itemActions));
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const manual = JSON.parse(localStorage.getItem(MANUAL_KEY) || '[]');
    fetch('/api/state', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ actions: itemActions, manual })
    }).catch(() => {});
  }, 500);
}

function getAction(name) { return itemActions[name] || { status: 'none', day: null, notes: '', reserveDate: '' }; }
function setAction(name, status, day, notes, reserveDate) {
  const prev = itemActions[name] || {};
  itemActions[name] = { status, day: day || null, notes: notes || '', reserveDate: reserveDate !== undefined ? reserveDate : (prev.reserveDate || '') };
  saveActions(); renderAll();
}
function exportActions() {
  const blob = new Blob([JSON.stringify(itemActions, null, 2)], {type: 'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'japan-trip-actions.json'; a.click();
}
function importActions(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { itemActions = JSON.parse(ev.target.result); saveActions(); renderAll(); };
  reader.readAsText(file);
}
function clearActions() {
  if (confirm('Reset all actions? This cannot be undone.')) { itemActions = {}; saveActions(); renderAll(); }
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const counts = { total: DATA.length, want: 0, flag: 0, research: 0, reserve: 0, booked: 0, assigned: 0, skip: 0 };
  DATA.forEach(d => { const a = getAction(d.name).status; if (counts[a] !== undefined) counts[a]++; });
  const unactioned = counts.total - counts.want - counts.flag - counts.research - counts.reserve - counts.booked - counts.assigned - counts.skip;
  bar.innerHTML = `
    <div class="stat ${activeFilters.action==='All'?'active-stat':''}" data-action-filter="All"><div class="label">Total</div><div class="value">${counts.total}</div></div>
    <div class="stat ${activeFilters.action==='want'?'active-stat':''}" data-action-filter="want"><div class="label">💖 Want</div><div class="value" style="color:var(--pink)">${counts.want}</div></div>
    <div class="stat ${activeFilters.action==='flag'?'active-stat':''}" data-action-filter="flag"><div class="label">🚩 Discuss</div><div class="value" style="color:var(--amber)">${counts.flag}</div></div>
    <div class="stat ${activeFilters.action==='reserve'?'active-stat':''}" data-action-filter="reserve"><div class="label">🎫 Reserve</div><div class="value" style="color:var(--red)">${counts.reserve}</div></div>
    <div class="stat ${activeFilters.action==='research'?'active-stat':''}" data-action-filter="research"><div class="label">🔍 Research</div><div class="value" style="color:var(--purple)">${counts.research}</div></div>
    <div class="stat ${activeFilters.action==='booked'?'active-stat':''}" data-action-filter="booked"><div class="label">✅ Booked</div><div class="value" style="color:var(--green)">${counts.booked}</div></div>

}

function renderFilters() {
  const cities = ['All', ...new Set(DATA.map(d => d.city))];
  const cats = ['All', ...new Set(DATA.map(d => d.category))];
  const actions = ['All', 'want', 'flag', 'research', 'reserve', 'booked', 'assigned', 'skip', 'none'];

  // Neighborhoods: show only for selected city, min 3 items, sorted by count
  const hoodSource = activeFilters.city === 'All' ? DATA : DATA.filter(d => d.city === activeFilters.city);
  const hoodCounts = {};
  hoodSource.forEach(d => { const h = d.neighborhood || ''; if (h && !h.includes('Various') && h.length > 0) { hoodCounts[h] = (hoodCounts[h]||0) + 1; } });
  const hoods = ['All', ...Object.entries(hoodCounts).sort((a,b) => b[1]-a[1]).map(([h]) => h)];

  document.getElementById('city-filters').innerHTML = cities.map(c =>
    `<button class="filter-btn ${activeFilters.city===c?'active':''}" data-filter="city" data-value="${c}">${c}</button>`
  ).join('');
  const hoodSelect = document.getElementById('hood-filters');
  hoodSelect.innerHTML = hoods.map(h =>
    `<option value="${h}" ${activeFilters.neighborhood===h?'selected':''}>${h === 'All' ? 'All Areas' : h + ' (' + hoodCounts[h] + ')'}</option>`
  ).join('');
  document.getElementById('cat-filters').innerHTML = cats.map(c =>
    `<button class="filter-btn ${activeFilters.category===c?'active':''}" data-filter="category" data-value="${c}">${c}</button>`
  ).join('');
  document.getElementById('action-filters').innerHTML = actions.map(a => {
    const info = ACTIONS[a] || {label:a,icon:''};
    const label = a === 'All' ? 'All' : `${info.icon} ${info.label}`;
    return `<button class="filter-btn ${activeFilters.action===a?'active':''}" data-filter="action" data-value="${a}">${label}</button>`;
  }).join('');
}

function getFiltered() {
  return DATA.filter(d => {
    if (activeFilters.city !== 'All' && d.city !== activeFilters.city) return false;
    if (activeFilters.neighborhood !== 'All' && (d.neighborhood||'') !== activeFilters.neighborhood) return false;
    if (activeFilters.category !== 'All' && d.category !== activeFilters.category) return false;
    if (activeFilters.action !== 'All') {
      const s = getAction(d.name).status;
      if (activeFilters.action !== s) return false;
    }
    if (searchTerm && !JSON.stringify(d).toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  }).sort((a, b) => {
    let av, bv;
    if (sortField === 'action') { av = getAction(a.name).status; bv = getAction(b.name).status; }
    else if (sortField === 'assignedDay') { av = getAction(a.name).day||99; bv = getAction(b.name).day||99; }
    else { av = a[sortField]; bv = b[sortField]; }
    if (typeof av === 'string') { av = av.toLowerCase(); bv = (bv||'').toLowerCase(); }
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return 0;
  });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function getCls(cat) { return cat==='Food'?'food':cat==='Attraction'?'attraction':cat==='Experience'?'experience':cat.includes('Temple')?'temple':cat==='Shopping'?'shopping':'attraction'; }
function getHeatCls(h) { const l=h.toLowerCase(); return l.includes('indoor')?'indoor':l.includes('evening')?'evening':l.includes('early')?'early':l.includes('cool')?'cool':l.includes('hot')||l.includes('⚠')?'hot':'indoor'; }
function getCityCls(c) { return c.includes('Tokyo')?'city-tokyo':c.includes('Kyoto')?'city-kyoto':c.includes('Osaka')?'city-osaka':c.includes('Kanazawa')?'city-kanazawa':c.includes('Hakone')?'city-hakone':''; }
function dots(p) { const pc=p>=5?'p5':p>=4?'p4':p>=3?'p3':'p2'; return Array.from({length:5},(_,i)=>`<div class="dot ${i<p?'filled '+pc:''}"></div>`).join(''); }

function renderMap() {
  if (!map) { map = L.map('map').setView([35.5,136.5],7); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',maxZoom:19}).addTo(map); }
  markers.forEach(m => map.removeLayer(m)); markers = [];
  const colors = {Food:'#ef4444',Attraction:'#3b82f6',Experience:'#a855f7','Temple/Shrine':'#22c55e',Shopping:'#ec4899'};
  getFiltered().forEach(d => {
    if (!d.lat) return;
    const a = getAction(d.name);
    const color = a.status==='skip'?'#444':a.status==='booked'?'#22c55e':a.status==='want'?'#ec4899':colors[d.category]||'#f59e0b';
    const m = L.circleMarker([d.lat,d.lng],{radius:4+d.priority*1.5,fillColor:color,color:'#fff',weight:1,opacity:0.8,fillOpacity:0.7}).addTo(map);
    const aLabel = a.status!=='none'?`<br><b>${ACTIONS[a.status].icon} ${ACTIONS[a.status].label}</b>${a.day?' · Day '+a.day:''}`:''
    m.bindPopup(`<strong>${d.name}</strong><br><span style="color:#9ca3af;font-size:11px">${d.category} · ${d.city} · ${d.neighborhood}</span><br>${'★'.repeat(d.priority)}${'☆'.repeat(5-d.priority)}<br>${d.why}${aLabel}`,{maxWidth:280});
    markers.push(m);
  });
  if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
}

function dayMatchesDayNum(daysStr, n) {
  return String(daysStr||'').split(',').some(r => { r=r.trim(); if(!r) return false; if(r.includes('-')){const[a,b]=r.split('-').map(Number);return n>=a&&n<=b;} return r==n; });
}

function groupByNeighborhood(items) {
  const groups = {};
  items.forEach(d => {
    const hood = d.neighborhood || 'Other';
    if (!groups[hood]) groups[hood] = [];
    groups[hood].push(d);
  });
  return Object.entries(groups).sort((a,b) => {
    const aPri = Math.max(...a[1].map(d=>d.priority));
    const bPri = Math.max(...b[1].map(d=>d.priority));
    return bPri - aPri;
  });
}

function dcDayPick(btn) {
  const name = btn.dataset.target;
  const day = parseInt(btn.dataset.pickDay);
  const current = getAction(name);
  const newDay = current.day === day ? null : day;
  const newStatus = newDay && current.status === 'none' ? 'assigned' : current.status;
  setAction(name, newStatus, newDay, current.notes, current.reserveDate);
}

function renderDays() {
  const container = document.getElementById('day-columns');
  const filtered = getFiltered();
  container.innerHTML = DAYS.map(dy => {
    const assigned = filtered.filter(d => getAction(d.name).day === dy.n).sort((a,b) => b.priority - a.priority);
    const possible = filtered.filter(d => {
      if (getAction(d.name).day === dy.n) return false;
      const a = getAction(d.name).status;
      if (a === 'skip') return false;
      return dayMatchesDayNum(d.days, dy.n);
    }).sort((a,b) => b.priority - a.priority);

    const assignedByHood = groupByNeighborhood(assigned);
    const possibleByHood = groupByNeighborhood(possible);

    return '<div class="day-column">' +
      '<h3>Day '+dy.n+' &mdash; '+dy.t+'</h3>' +
      '<div class="day-meta">'+dy.d+' &middot; '+dy.c+'</div>' +

      (assigned.length ? '<div class="section-label" style="color:var(--green)">&#x2714; Assigned ('+assigned.length+')</div>' +
        assignedByHood.map(([hood, items]) =>
          '<div class="nh-group"><div class="nh-header"><span>'+hood+'</span><span class="nh-count">'+items.length+'</span></div>' +
          items.map(d => renderDayCard(d, 'border-left:3px solid var(--green)')).join('') +
          '</div>'
        ).join('') : '') +

      (possible.length ? '<div class="section-label" style="color:var(--muted)">Could fit here ('+possible.length+')</div>' +
        possibleByHood.map(([hood, items]) =>
          '<div class="nh-group"><div class="nh-header"><span>'+hood+'</span><span class="nh-count">'+items.length+'</span></div>' +
          items.map(d => renderDayCard(d, '')).join('') +
          '</div>'
        ).join('') : '') +

      (!assigned.length && !possible.length ? '<div class="day-card"><div class="dc-meta">Travel / rest day</div></div>' : '') +
    '</div>';
  }).join('');
}

function dcAction(btn) {
  const name = btn.dataset.dcTarget;
  const status = btn.dataset.dcAction;
  const current = getAction(name);
  setAction(name, status, current.day, current.notes);
}

function renderItinerary() {
  const container = document.getElementById('itin-content');
  const hotelForDay = d => d<=5?HOTELS[1]:d===6?HOTELS[6]:d>=7&&d<=10?HOTELS[7]:d<=12?HOTELS[11]:HOTELS[13];
  const prevHotel = d => d<=1?null:d<=5?HOTELS[1]:d===6?HOTELS[1]:d===7?HOTELS[6]:d<=10?HOTELS[7]:d===11?HOTELS[7]:d<=12?HOTELS[11]:HOTELS[11];

  let html = '<div class="itin">';

  // Cover
  html += '<div class="itin-cover">';
  html += '<h1>Drazin Family<br>Japan Journey</h1>';
  html += '<div class="itin-dates">August 17 — 30, 2026</div>';
  html += '<div class="itin-route">Tokyo · Hakone · Kyoto · Kanazawa · Tokyo</div>';
  html += '<div class="itin-family">Matt, wife, and two children (ages 9 and 13)</div>';
  html += '</div>';

  ITIN_DAYS.forEach(day => {
    const hotel = hotelForDay(day.n);
    const transit = TRANSIT[day.n];
    const isNewHotel = day.n === 1 || hotelForDay(day.n).name !== (prevHotel(day.n)||{}).name;

    // Get assigned activities for this day
    const assigned = DATA.filter(d => getAction(d.name).day === day.n)
      .sort((a,b) => b.priority - a.priority);

    // Get "want" items that match this day but aren't assigned
    const wants = DATA.filter(d => {
      const a = getAction(d.name);
      if (a.day === day.n) return false;
      if (a.status !== 'want' && a.status !== 'reserve' && a.status !== 'booked') return false;
      return dayMatchesDayNum(d.days, day.n);
    }).sort((a,b) => b.priority - a.priority).slice(0, 4);

    html += '<div class="itin-day">';

    // Day header
    html += '<div class="itin-day-header">';
    html += '<div class="itin-day-num">Day ' + day.n + '</div>';
    html += '<div class="itin-day-title">' + day.title + '</div>';
    html += '<div class="itin-day-date">' + day.date + '</div>';
    html += '</div>';

    // Transit (if applicable)
    if (transit) {
      html += '<div class="itin-transit">';
      html += '<div class="itin-transit-title">' + transit.from + ' → ' + transit.to + '</div>';
      html += '<div class="itin-transit-detail">' + transit.mode + ' · ' + transit.time + '</div>';
      if (transit.luggage) html += '<div class="itin-transit-luggage">Luggage: ' + transit.luggage + '</div>';
      html += '</div>';
    }

    // Hotel (show on check-in days)
    if (isNewHotel && hotel) {
      html += '<div class="itin-hotel">';
      html += '<div class="itin-hotel-name">' + hotel.name + '</div>';
      html += '<div class="itin-hotel-detail">' + hotel.addr + '</div>';
      html += '<div class="itin-hotel-detail">' + hotel.room + '</div>';
      if (hotel.perks && hotel.perks.length) {
        html += '<div class="itin-hotel-detail" style="color:var(--green);margin-top:4px">' + hotel.perks.join(' · ') + '</div>';
      }
      html += '</div>';
    }

    // Assigned activities
    if (assigned.length) {
      html += '<div class="itin-section-label">Planned</div>';
      assigned.forEach(d => {
        const a = getAction(d.name);
        html += '<div class="itin-activity">';
        html += '<div class="itin-time">' + (d.heat.toLowerCase().includes('early') ? 'Morning' : d.heat.toLowerCase().includes('evening') ? 'Evening' : d.heat.toLowerCase().includes('indoor') ? 'Flexible' : '') + '</div>';
        html += '<div class="itin-act-body">';
        html += '<div class="itin-act-name">' + (a.status === 'booked' ? '✅ ' : '') + d.name + '</div>';
        if (d.neighborhood) html += '<div class="itin-act-hood">' + d.neighborhood + '</div>';
        if (d.why) html += '<div class="itin-act-why">' + d.why + '</div>';
        html += '<div class="itin-act-tags">';
        html += '<span class="itin-act-tag badge badge-' + getCls(d.category) + '">' + d.category + '</span>';
        html += '<span class="itin-act-tag heat-tag heat-' + getHeatCls(d.heat) + '">' + d.heat + '</span>';
        if (a.status === 'booked') html += '<span class="itin-act-tag" style="background:rgba(34,197,94,0.15);color:var(--green)">Confirmed</span>';
        if (a.status === 'reserve') html += '<span class="itin-act-tag" style="background:rgba(239,68,68,0.15);color:#fca5a5">Needs booking</span>';
        html += '</div>';
        if (a.notes) html += '<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic">' + esc(a.notes) + '</div>';
        if (d.ig_url) html += '<a class="itin-act-link" href="' + d.ig_url + '" target="_blank">View original post</a>';
        html += '</div></div>';
      });
    }

    // Considering
    if (wants.length) {
      html += '<div class="itin-section-label">Considering</div>';
      wants.forEach(d => {
        const a = getAction(d.name);
        html += '<div class="itin-activity" style="opacity:0.6">';
        html += '<div class="itin-time"></div>';
        html += '<div class="itin-act-body">';
        html += '<div class="itin-act-name">' + ACTIONS[a.status].icon + ' ' + d.name + '</div>';
        if (d.neighborhood) html += '<div class="itin-act-hood">' + d.neighborhood + '</div>';
        html += '<div class="itin-act-why">' + d.why + '</div>';
        html += '</div></div>';
      });
    }

    if (!assigned.length && !wants.length && !transit) {
      html += '<div class="itin-empty">Day at ' + hotel.name + ' — ' + day.theme + '</div>';
    }

    // Meals section for assigned food items
    const foodItems = assigned.filter(d => d.category === 'Food');
    if (foodItems.length) {
      html += '<div class="itin-meals"><h4>Dining</h4>';
      foodItems.forEach(d => {
        html += '<div class="itin-meal-item"><span class="itin-meal-value">' + d.name + ' — ' + (d.neighborhood || d.city) + '</span></div>';
      });
      html += '</div>';
    }

    // Notes
    const dayNotes = [];
    if (day.n === 5) dayNotes.push('Confirm luggage forwarding with Keio Plaza concierge before evening');
    if (day.n === 10) dayNotes.push('Arrange luggage forwarding Kyoto → New Otani Tokyo');
    if (day.n === 1) dayNotes.push('Keep evening light — avoid ambitious dinner reservations on arrival night');
    if ([8,10].includes(day.n)) dayNotes.push('Heat strategy: early morning outings (6-10 AM), midday hotel/AC break, evening plans (4-9 PM)');
    if (dayNotes.length) {
      html += '<div class="itin-notes">' + dayNotes.map(n => '• ' + n).join('<br>') + '</div>';
    }

    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderCalendar() {
  const container = document.getElementById('calendar-content');
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  // Build events: booking windows + user reserve dates + trip days
  const events = {};
  function addEvent(dateStr, item) {
    if (!events[dateStr]) events[dateStr] = [];
    events[dateStr].push(item);
  }

  // Booking windows from spreadsheet
  BOOKING_WINDOWS.forEach(bw => {
    addEvent(bw.opens, {type:'opens', name:bw.name, note:bw.note});
    if (bw.deadline !== bw.opens) addEvent(bw.deadline, {type:'deadline', name:bw.name, note:'Last chance to book'});
  });

  // User-set reservation dates
  DATA.forEach(d => {
    const a = getAction(d.name);
    if (a.reserveDate) {
      const type = a.status === 'booked' ? 'booked' : 'reserve';
      addEvent(a.reserveDate, {type, name:d.name, note: a.notes || d.booking || ''});
    }
  });

  // Trip days
  const tripDates = {
    '2026-08-17':'Day 1: Arrive Tokyo','2026-08-18':'Day 2: East Tokyo','2026-08-19':'Day 3: Harajuku/Shibuya',
    '2026-08-20':'Day 4: Art/Ginza','2026-08-21':'Day 5: Flex Day','2026-08-22':'Day 6: Hakone',
    '2026-08-23':'Day 7: Arrive Kyoto','2026-08-24':'Day 8: Arashiyama','2026-08-25':'Day 9: Osaka',
    '2026-08-26':'Day 10: East Kyoto','2026-08-27':'Day 11: Kanazawa','2026-08-28':'Day 12: Kanazawa',
    '2026-08-29':'Day 13: Back to Tokyo','2026-08-30':'Day 14: Departure'
  };

  // Render months from May 2026 through Aug 2026
  const months = [[2026,4],[2026,5],[2026,6],[2026,7]]; // 0-indexed months
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = '<div class="cal-legend">';
  html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(34,197,94,0.3)"></div> Booking opens</div>';
  html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(239,68,68,0.3)"></div> Deadline</div>';
  html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(245,158,11,0.3)"></div> Your reservation date</div>';
  html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(34,197,94,0.4)"></div> Booked / confirmed</div>';
  html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(59,130,246,0.3)"></div> Trip day</div>';
  html += '</div>';

  months.forEach(([year, month]) => {
    const monthName = new Date(year, month).toLocaleDateString('en-US', {month:'long', year:'numeric'});
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();

    html += '<div class="cal-month">';
    html += '<div class="cal-month-header">' + monthName + '</div>';

    // Day name headers
    html += '<div class="cal-week">';
    html += '<div></div>';
    dayNames.forEach(d => { html += '<div class="cal-week-header">' + d + '</div>'; });
    html += '</div>';

    let dayNum = 1;
    for (let week = 0; week < 6 && dayNum <= daysInMonth; week++) {
      html += '<div class="cal-week">';
      html += '<div style="font-size:11px;color:var(--muted);padding:8px 4px;text-align:right">Week ' + (week+1) + '</div>';
      for (let dow = 0; dow < 7; dow++) {
        if ((week === 0 && dow < firstDay) || dayNum > daysInMonth) {
          html += '<div class="cal-day" style="opacity:0.15"></div>';
        } else {
          const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
          const isToday = dateStr === todayStr;
          const isTrip = !!tripDates[dateStr];
          const isPast = dateStr < todayStr;
          const dayEvents = events[dateStr] || [];
          const tripLabel = tripDates[dateStr] || '';

          let cls = 'cal-day';
          if (isToday) cls += ' cal-today';
          if (isTrip) cls += ' cal-trip';
          if (isPast) cls += ' cal-past';

          html += '<div class="' + cls + '">';
          html += '<div class="cal-day-num">' + dayNum;
          if (isToday) html += '<span class="cal-day-label" style="color:var(--accent)">TODAY</span>';
          if (tripLabel) html += '<span class="cal-day-label" style="color:var(--cyan)">' + tripLabel.split(':')[0] + '</span>';
          html += '</div>';

          if (tripLabel) {
            html += '<div class="cal-item cal-item-trip">' + tripLabel.split(': ')[1] + '</div>';
          }
          dayEvents.forEach(ev => {
            const cls = ev.type === 'opens' ? 'cal-item-opens' : ev.type === 'deadline' ? 'cal-item-deadline' : ev.type === 'booked' ? 'cal-item-booked' : 'cal-item-reserve';
            const prefix = ev.type === 'opens' ? 'OPENS: ' : ev.type === 'deadline' ? 'DEADLINE: ' : ev.type === 'booked' ? '✅ ' : '🎫 ';
            html += '<div class="cal-item ' + cls + '" title="' + esc(ev.note) + '">' + prefix + esc(ev.name) + '</div>';
          });

          html += '</div>';
          dayNum++;
        }
      }
      html += '</div>';
    }
    html += '</div>';
  });

  // Summary: upcoming actions
  const upcoming = [];
  BOOKING_WINDOWS.forEach(bw => {
    if (bw.opens >= todayStr) upcoming.push({date:bw.opens, type:'opens', name:bw.name, note:bw.note});
    if (bw.deadline >= todayStr && bw.deadline !== bw.opens) upcoming.push({date:bw.deadline, type:'deadline', name:bw.name, note:'Deadline'});
  });
  DATA.forEach(d => {
    const a = getAction(d.name);
    if (a.reserveDate && a.reserveDate >= todayStr && a.status !== 'booked') {
      upcoming.push({date:a.reserveDate, type:'reserve', name:d.name, note:a.notes||''});
    }
  });
  upcoming.sort((a,b) => a.date.localeCompare(b.date));

  if (upcoming.length) {
    html += '<div style="margin-top:24px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px">';
    html += '<h3 style="font-size:16px;margin-bottom:12px">Upcoming Booking Actions</h3>';
    html += '<table style="width:100%"><thead><tr>';
    html += '<th style="width:120px">Date</th><th style="width:100px">Type</th><th>Item</th><th>Notes</th>';
    html += '</tr></thead><tbody>';
    upcoming.forEach(u => {
      const d = new Date(u.date + 'T12:00:00');
      const dateLabel = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      const daysAway = Math.ceil((d - today) / 86400000);
      const urgency = daysAway <= 3 ? 'color:var(--red);font-weight:700' : daysAway <= 14 ? 'color:var(--amber)' : 'color:var(--muted)';
      const typeLabel = u.type === 'opens' ? '🟢 Opens' : u.type === 'deadline' ? '🔴 Deadline' : '🎫 Reserve';
      html += '<tr><td style="' + urgency + '">' + dateLabel + ' <span style="font-size:11px">(' + daysAway + 'd)</span></td>';
      html += '<td>' + typeLabel + '</td>';
      html += '<td style="font-weight:600">' + esc(u.name) + '</td>';
      html += '<td style="color:var(--muted)">' + esc(u.note) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  container.innerHTML = html;
}

function setupListeners() {
  document.addEventListener('click', e => {
    // Close any open menus when clicking elsewhere
    if (!e.target.closest('.action-cell')) { document.querySelectorAll('.action-menu.open').forEach(m=>m.classList.remove('open')); openMenu=null; }

    // Day view card expand
    if (e.target.closest('.day-card') && !e.target.closest('.dc-action-btn') && !e.target.closest('.dc-ig-link')) {
      e.target.closest('.day-card').classList.toggle('dc-open');
    }

    // Stat cards as action filters
    if (e.target.closest('.stat[data-action-filter]')) {
      activeFilters.action = e.target.closest('.stat').dataset.actionFilter;
      renderAll();
    }

    // Filter buttons
    if (e.target.classList.contains('filter-btn')) {
      const filter = e.target.dataset.filter;
      activeFilters[filter] = e.target.dataset.value;
      if (filter === 'city') activeFilters.neighborhood = 'All';
      renderAll();
    }

    // Action badge click -> open menu
    if (e.target.closest('.action-badge')) {
      e.stopPropagation();
      const cell = e.target.closest('.action-cell');
      const menu = cell.querySelector('.action-menu');
      const wasOpen = menu.classList.contains('open');
      document.querySelectorAll('.action-menu.open').forEach(m=>m.classList.remove('open'));
      if (!wasOpen) menu.classList.add('open');
    }

    // Menu item click
    if (e.target.closest('.action-menu-item')) {
      const el = e.target.closest('.action-menu-item');
      const name = el.dataset.target;
      const status = el.dataset.setAction;
      const current = getAction(name);
      setAction(name, status, current.day, current.notes);
    }

    // Day pick
    if (e.target.classList.contains('day-pick-btn')) {
      const name = e.target.dataset.target;
      const day = parseInt(e.target.dataset.pickDay);
      const current = getAction(name);
      const newDay = current.day === day ? null : day;
      const newStatus = newDay && current.status === 'none' ? 'assigned' : current.status;
      setAction(name, newStatus, newDay, current.notes);
    }

    // Expand toggle — click anywhere on the row except action cell
    if (e.target.closest('.data-row') && !e.target.closest('.action-cell')) {
      const idx = e.target.closest('.data-row').querySelector('.expand-toggle').dataset.expandIdx;
      const row = document.querySelector(`tr[data-expand="${idx}"]`);
      if (row) row.classList.toggle('open');
    }

    // Tabs
    if (e.target.classList.contains('tab') && e.target.dataset.view) {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      e.target.classList.add('active');
      const v = e.target.dataset.view;
      document.getElementById('table-view').style.display = v==='table'?'block':'none';
      document.getElementById('map-view').style.display = v==='map'?'block':'none';
      document.getElementById('day-view').style.display = v==='days'?'block':'none';
      document.getElementById('calendar-view').style.display = v==='calendar'?'block':'none';
      document.getElementById('itin-view').style.display = v==='itinerary'?'block':'none';
      document.getElementById('controls').style.display = v==='itinerary'?'none':'flex';
      if (v==='map') setTimeout(()=>{if(!map)renderMap();else{map.invalidateSize();renderMap();}},100);
      if (v==='days') renderDays();
      if (v==='calendar') renderCalendar();
      if (v==='itinerary') renderItinerary();
    }
  });

  // Notes and reserve date save on blur/change
  document.addEventListener('focusout', e => {
    if (e.target.classList.contains('notes-input') && e.target.dataset.notesFor) {
      const name = e.target.dataset.notesFor;
      const current = getAction(name);
      if (e.target.value !== (current.notes||'')) {
        setAction(name, current.status, current.day, e.target.value, current.reserveDate);
      }
    }
  });
  document.addEventListener('change', e => {
    if (e.target.classList.contains('reserve-date-input') || e.target.classList.contains('dc-resdate')) {
      const name = e.target.dataset.resdateFor;
      const current = getAction(name);
      const newStatus = current.status === 'none' ? 'reserve' : current.status;
      setAction(name, newStatus, current.day, current.notes, e.target.value);
    }
  });
  document.addEventListener('focusout', e => {
    if (e.target.classList.contains('dc-notes')) {
      const name = e.target.dataset.dcNotesFor;
      const current = getAction(name);
      if (e.target.value !== (current.notes||'')) {
        setAction(name, current.status, current.day, e.target.value, current.reserveDate);
      }
    }
  });

  // Area dropdown
  document.getElementById('hood-filters').addEventListener('change', e => {
    activeFilters.neighborhood = e.target.value;
    renderAll();
  });

  // Sort
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const f = th.dataset.sort;
      if (sortField===f) sortDir*=-1; else { sortField=f; sortDir=f==='priority'?-1:1; }
      renderTable();
    });
  });

  // Search
  document.getElementById('search').addEventListener('input', e => { searchTerm=e.target.value; renderTable(); if(map)renderMap(); });

  // Add place
  document.getElementById('add-place-tab').addEventListener('click', e => {
    e.stopPropagation();
    const form = document.getElementById('add-place-form');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('ap-cancel').addEventListener('click', () => {
    document.getElementById('add-place-form').style.display = 'none';
  });
  document.getElementById('ap-submit').addEventListener('click', () => {
    const name = document.getElementById('ap-name').value.trim();
    if (!name) { document.getElementById('ap-name').style.borderColor = 'var(--red)'; return; }
    const city = document.getElementById('ap-city').value;
    const hood = document.getElementById('ap-hood').value.trim();
    const cat = document.getElementById('ap-cat').value;
    const days = document.getElementById('ap-days').value.trim();
    const why = document.getElementById('ap-why').value.trim();
    const cityCoords = {Tokyo:[35.68,139.77],Kyoto:[35.01,135.77],Osaka:[34.69,135.50],Kanazawa:[36.56,136.66],Hakone:[35.23,139.06]};
    const coords = cityCoords[city] || [35.68,139.77];
    DATA.push({
      name: name, city: city, neighborhood: hood, category: cat,
      why: why, family_fit: '', booking: '', priority: 3,
      heat: 'Indoor', days: days, source: 'Manual',
      lat: coords[0] + (Math.random()-0.5)*0.02,
      lng: coords[1] + (Math.random()-0.5)*0.02,
      url: ''
    });
    // Save manual additions to localStorage so they persist
    const manualItems = JSON.parse(localStorage.getItem(MANUAL_KEY) || '[]');
    manualItems.push(DATA[DATA.length-1]);
    localStorage.setItem(MANUAL_KEY, JSON.stringify(manualItems));
    saveActions();
    // Reset form
    document.getElementById('ap-name').value = '';
    document.getElementById('ap-hood').value = '';
    document.getElementById('ap-days').value = '';
    document.getElementById('ap-why').value = '';
    document.getElementById('ap-name').style.borderColor = '';
    document.getElementById('add-place-form').style.display = 'none';
    renderAll();
  });
}

// Restore manual additions from localStorage
function restoreManual() {
  const manualItems = JSON.parse(localStorage.getItem(MANUAL_KEY) || '[]');
  const existing = new Set(DATA.map(d => d.name.toLowerCase()));
  manualItems.forEach(item => {
    if (!existing.has(item.name.toLowerCase())) {
      DATA.push(item);
      existing.add(item.name.toLowerCase());
    }
  });
}
restoreManual();
init();
</script>
</body>
</html>
